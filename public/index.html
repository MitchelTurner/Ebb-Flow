<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Ebb &amp; Flow</title>
  <meta name="description" content="Local news from the Tongass Narrows — subscribe to the weekly roundup.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@500;700&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <nav class="site-nav" aria-label="Primary">
    <a href="/">Home</a>
    <a href="/admin/">Admin</a>
  </nav>

  <main class="hero">
    <div class="hero-inner">
      <p class="eyebrow">Ketchikan, Alaska · Est. 2026</p>
      <h1 class="brand"><span>The Ebb</span><span>&amp; Flow</span></h1>
      <div class="rule" aria-hidden="true"></div>
      <p class="lede">Local news from the Tongass Narrows — six stories worth your time, once a week.</p>

      <form class="form-shell" id="subscribe-form" novalidate>
        <div class="form-row two">
          <label>
            First name
            <input type="text" name="first_name" autocomplete="given-name" placeholder="Neighbor">
          </label>
          <label>
            Email
            <input type="email" name="email" autocomplete="email" required placeholder="you@example.com">
          </label>
        </div>
        <div class="actions">
          <button type="submit">Subscribe</button>
          <span class="note">Free. Unsubscribe anytime.</span>
        </div>
        <p class="message" id="subscribe-message" role="status" aria-live="polite"></p>
      </form>

      <p class="footer-link">Already subscribed? Manage prefs from any issue footer.</p>
    </div>
  </main>

  <script src="/subscribe.js" type="module"></script>
</body>
</html>
