<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Ebb &amp; Flow</title>
  <meta name="description" content="Local news from the Tongass Narrows — subscribe to the weekly roundup.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="stage" aria-hidden="true">
    <div class="grid-veil"></div>
    <div class="orb orb-a"></div>
    <div class="orb orb-b"></div>
    <div class="scan"></div>
  </div>

  <main class="hero">
    <header class="topline">
      <span class="signal"></span>
      <span>Ketchikan · AK</span>
      <span class="sep">/</span>
      <span>Weekly</span>
    </header>

    <div class="hero-copy">
      <p class="eyebrow">Local news from the Tongass Narrows</p>
      <h1 class="brand">
        <span>The Ebb</span>
        <span class="amp">&amp; Flow</span>
      </h1>
      <p class="lede">Six stories worth your time — tides, town hall, and what’s opening on Main.</p>
    </div>

    <form class="subscribe" id="subscribe-form" novalidate>
      <div class="fields">
        <label>
          <span>First name</span>
          <input type="text" name="first_name" autocomplete="given-name" placeholder="Neighbor">
        </label>
        <label class="wide">
          <span>Email</span>
          <input type="email" name="email" autocomplete="email" required placeholder="you@example.com">
        </label>
        <button type="submit">
          <span>Subscribe</span>
          <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3 8h10M9 4l4 4-4 4" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
        </button>
      </div>
      <div class="meta-row">
        <p class="note">Free. Cancel anytime.</p>
        <p class="message" id="subscribe-message" role="status" aria-live="polite"></p>
      </div>
    </form>
  </main>

  <script src="/subscribe.js" type="module"></script>
</body>
</html>
