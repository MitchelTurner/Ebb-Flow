name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run smoke
      - run: npm run smoke:names
      - run: npm run smoke:cron
      - run: npm run smoke:welcome
      - run: npm run smoke:webhooks
      - run: npm run smoke:extract
      - run: npm run build
