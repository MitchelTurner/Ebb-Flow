[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"

# Weekly send also arms inside the web process (WEEKLY_CRON_ENABLED=true).
# For a dedicated Railway Cron service, use railway.cron.toml:
#   startCommand = npm run start:cron
#   cronSchedule = 0 15 * * 1   (Mondays 15:00 UTC)
