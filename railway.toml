[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build"

[deploy]
startCommand = "npm run start"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"

# Weekly send arms inside the web process when WEEKLY_CRON_ENABLED=true (default).
# Pick ONE runner:
#   A) Web-only: leave WEEKLY_CRON_ENABLED=true (default) — no separate cron service
#   B) Dedicated Railway Cron: use railway.cron.toml AND set WEEKLY_CRON_ENABLED=false
#      on the web service so Monday send does not fire twice.
# Cron HTTP routes require CRON_SECRET in production.
